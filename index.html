<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Portfolio Test</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #222; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="module">
    // Direct import from CDN to avoid Import Map issues
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const scene = new THREE.Scene();
    // 1. FAIL-SAFE: If you see this color, the script is working.
    scene.background = new THREE.Color(0x1a1a1a); 

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 5, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 2. BOX GEOMETRY (Placeholder)
    const geometry = new THREE.BoxGeometry(2, 2, 2);
    // MeshStandardMaterial needs light. If light fails, it stays black.
    const material = new THREE.MeshStandardMaterial({ color: 0x00ff00 }); 
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    // 3. PUNCHY LIGHTS
    const ambient = new THREE.AmbientLight(0xffffff, 1); // Bright ambient light
    scene.add(ambient);

    const pointLight = new THREE.PointLight(0xffffff, 100);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    function animate() {
      requestAnimationFrame(animate);
      cube.rotation.x += 0.01;
      cube.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
