<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MG. Lawless</title>
  <link rel="icon" type="image/jpeg" href="https://cdn.discordapp.com/attachments/1186625565168500796/1491112293696536607/634fc7589ecb8b3229528763c2a246a1.jpg?ex=69d6820a&is=69d5308a&hm=eed0820dbc511d8613de37b479467bac7d0246cfb5ff357f407fda38b3e18e4f&">
  
  <style>
    :root {
      --accent: #ff3366;
      --text-dim: #666;
    }
    
    * { box-sizing: border-box; }

    body { 
      margin: 0; 
      background: #000; 
      font-family: 'Inter', -apple-system, sans-serif; 
      color: white;
      min-height: 150vh; /* Keeps it scrollable */
    }

    canvas { 
      display: block; 
      position: fixed; 
      top: 0; 
      left: 0; 
      z-index: 1; 
    }
    
    .main-nav { 
      position: fixed; 
      top: 40px; 
      left: 40px; 
      z-index: 10; 
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
    }

    .nav-logo { 
      font-weight: 800; 
      font-size: 1.2rem; 
      letter-spacing: 3px; 
      text-transform: uppercase; 
      border-left: 3px solid var(--accent); 
      padding-left: 15px; 
      transition: border-color 0.05s linear;
    }

    .nav-links { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      font-size: 0.85rem; 
      color: var(--text-dim); 
    }

    .nav-links a, .copy-link { 
      text-decoration: none;
      color: inherit;
      cursor: pointer; 
      transition: 0.3s ease; 
      width: fit-content; 
    }

    .nav-links a:hover, .copy-link:hover { 
      color: #fff; 
      transform: translateX(5px);
    }

    .copy-link {
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.05s linear;
    }

    .copy-link .status { display: none; color: #4ade80; font-weight: bold; }
    .copy-link.copied .status { display: inline; }
    .copy-link.copied .label { display: none; }

    .header-center {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: var(--accent);
      font-size: 1.8rem;
      pointer-events: none;
      white-space: nowrap;
      transition: color 0.05s linear;
    }

    .cursor {
      display: inline-block;
      width: 2px; 
      height: 1.6rem;
      background: var(--accent);
      margin-left: 8px;
      animation: blink 1s infinite;
      vertical-align: middle;
      transition: background 0.05s linear;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .content-wrapper { position: relative; z-index: 2; width: 100%; padding-top: 100vh; }

    footer {
      position: relative;
      z-index: 10;
      padding: 60px 40px;
      text-align: center;
      font-size: 0.65rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(to top, rgba(0,0,0,1), transparent);
    }

    .lil-gui { z-index: 100; }
  </style>
</head>
<body>

  <div class="header-center">
    <span id="typewriter"></span><span class="cursor"></span>
  </div>

  <nav class="main-nav">
    <div class="nav-logo">MG. Lawless</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="works.html">Works</a>
      <a href="blog.html">Blog</a>
      <div class="copy-link" id="copyEmail">
        <span class="label">Copy Email</span>
        <span class="status">Email Copied ✓</span>
      </div>
    </div>
  </nav>

  <div class="content-wrapper">
    </div>

  <footer>
    ©2026 / All Right Reserved / LAWLESS / MARWAN GEBRIEL
  </footer>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GUI } from 'lil-gui';

    // --- TYPEWRITER ---
    const text = "Welcome Traveller";
    const typewriterElement = document.getElementById('typewriter');
    let charIndex = 0;

    function type() {
      if (charIndex < text.length) {
        typewriterElement.textContent += text.charAt(charIndex);
        charIndex++;
        setTimeout(type, 100);
      }
    }
    setTimeout(type, 1500);

    // --- EMAIL ---
    const emailBtn = document.getElementById('copyEmail');
    const myEmail = 'maroggebriel@gmail.com';
    emailBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(myEmail).then(() => {
        emailBtn.classList.add('copied');
        setTimeout(() => emailBtn.classList.remove('copied'), 2000);
      });
    });

    // --- THREE.JS ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 6, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const params = {
      count: 70000,
      radius: 12,
      branches: 3,
      spin: 1,
      randomness: 0.3,
      insideColor: '#ff3366',
      outsideColor: '#3366ff'
    };

    let geometry, material, points = null;

    const syncAccentColor = () => {
      document.documentElement.style.setProperty('--accent', params.insideColor);
    };

    const generateGalaxy = () => {
      if(points !== null) {
        geometry.dispose();
        material.dispose();
        scene.remove(points);
      }

      geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(params.count * 3);
      const colors = new Float32Array(params.count * 3);
      const colorInside = new THREE.Color(params.insideColor);
      const colorOutside = new THREE.Color(params.outsideColor);

      for(let i = 0; i < params.count; i++) {
        const i3 = i * 3;
        const radius = Math.random() * params.radius;
        const spinAngle = radius * params.spin;
        const branchAngle = (i % params.branches) / params.branches * Math.PI * 2;

        const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
        const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
        const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;

        positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
        positions[i3 + 1] = randomY;
        positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

        const mixedColor = colorInside.clone().lerp(colorOutside, radius / params.radius);
        colors[i3] = mixedColor.r;
        colors[i3 + 1] = mixedColor.g;
        colors[i3 + 2] = mixedColor.b;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      material = new THREE.PointsMaterial({
        size: 0.015,
        sizeAttenuation: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true
      });

      points = new THREE.Points(geometry, material);
      scene.add(points);
      syncAccentColor();
    };

    generateGalaxy();

    // --- GUI ---
    const gui = new GUI();
    // Real-time update logic
    gui.addColor(params, 'insideColor').name('Core Color').onChange(() => {
      syncAccentColor();
      generateGalaxy(); 
    });
    gui.addColor(params, 'outsideColor').name('Edge Color').onChange(generateGalaxy);
    gui.close();

    function animate() {
      requestAnimationFrame(animate);
      if (points) points.rotation.y += 0.0005;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
