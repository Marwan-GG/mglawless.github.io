<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Galaxy Portfolio</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: black; color: white; overflow: hidden; }
        canvas { display: block; position: fixed; inset: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        // We use Three.js via CDN inside the React component
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        const GalaxyBackground = () => {
            const mountRef = useRef(null);

            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                mountRef.current.appendChild(renderer.domElement);

                // Galaxy Particles
                const geometry = new THREE.BufferGeometry();
                const count = 10000;
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);

                for (let i = 0; i < count * 3; i++) {
                    positions[i] = (Math.random() - 0.5) * 10;
                    colors[i] = Math.random();
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                const material = new THREE.PointsMaterial({
                    size: 0.02,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.8
                });

                const points = new THREE.Points(geometry, material);
                scene.add(points);

                camera.position.z = 2;

                const animate = () => {
                    requestAnimationFrame(animate);
                    points.rotation.y += 0.001;
                    points.rotation.x += 0.0005;
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };

                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            return <div ref={mountRef} style={{ position: 'fixed', inset: 0, z-index: -1 }} />;
        };

        const App = () => {
            return (
                <div className="relative z-10 p-10 font-sans">
                    <nav className="flex flex-col gap-4">
                        <h1 className="text-2xl font-bold tracking-widest border-l-4 border-cyan-400 pl-4 uppercase">M. Lawless</h1>
                        <div className="flex flex-col gap-2 text-gray-400 text-sm">
                            <span className="hover:text-cyan-400 cursor-pointer transition-colors">INDEX</span>
                            <span className="hover:text-cyan-400 cursor-pointer transition-colors">ARCHIVE</span>
                            <span className="hover:text-cyan-400 cursor-pointer transition-colors">INFORMATION</span>
                        </div>
                    </nav>
                    <GalaxyBackground />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
