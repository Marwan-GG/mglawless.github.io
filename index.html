<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MG. Lawless</title>
  <link rel="icon" type="image/jpeg" href="https://cdn.discordapp.com/attachments/1186625565168500796/1491112293696536607/634fc7589ecb8b3229528763c2a246a1.jpg">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #26c9df;
      --text-dim: #666;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      background: #000; 
      font-family: 'Inter', -apple-system, sans-serif; 
      color: white;
      min-height: 200vh;
      overflow-x: hidden;
    }

    /* TRANSITION OVERLAY */
    #transition-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 9999;
      pointer-events: none;
      transition: opacity 0.6s ease-in-out;
    }

    canvas { 
      display: block; 
      position: fixed; 
      top: 0; 
      left: 0; 
      z-index: 1; 
    }
    
    /* Navigation - EXACT MATCH TO WORKS */
    .main-nav { 
      position: fixed; 
      top: 40px; 
      left: 40px; 
      z-index: 10; 
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
    }

    .nav-logo { 
      font-weight: 800; 
      font-size: 1.2rem; 
      letter-spacing: 3px; 
      text-transform: uppercase; 
      border-left: 3px solid var(--accent); 
      padding-left: 15px; 
    }

    .nav-links { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      font-size: 0.85rem; 
      color: var(--text-dim); 
    }

    .nav-links a { 
      text-decoration: none;
      color: inherit;
      cursor: pointer; 
      transition: 0.3s ease; 
      width: fit-content; 
    }

    .nav-links a:hover { 
      color: #fff; 
      transform: translateX(5px);
    }

    /* Copy Link Logic */
    .copy-link {
      color: var(--accent);
      cursor: pointer;
      position: relative;
      height: 1.2rem; 
      display: flex;
      align-items: center;
      transition: color 0.4s ease-in-out, transform 0.3s ease;
      width: fit-content;
    }
    .copy-link:hover { transform: translateX(5px); }
    .copy-link .label { transition: opacity 0.3s ease, transform 0.3s ease; }
    .copy-link .status { 
      position: absolute; left: 0; opacity: 0; color: #4ade80; font-weight: bold;
      pointer-events: none; white-space: nowrap; transform: translateY(5px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .copy-link.copied .label { opacity: 0; transform: translateY(-5px); }
    .copy-link.copied .status { opacity: 1; transform: translateY(0); }

    /* Typewriter Header */
    .header-center {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'JetBrains Mono', monospace;
      font-weight: bold;
      color: var(--accent);
      font-size: 1.8rem;
      pointer-events: none;
      white-space: nowrap;
    }

    .cursor {
      display: inline-block;
      width: 2px; 
      height: 1.6rem;
      background: var(--accent);
      margin-left: 4px;
      animation: blink 1s infinite;
      vertical-align: middle;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Footer */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      padding: 30px;
      text-align: center;
      pointer-events: none;
    }
    .footer-content {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    .yt-icon { width: 24px; height: 24px; stroke: #444; transition: stroke 0.3s ease; }
    .footer-content:hover .yt-icon { stroke: #fff; }
    .footer-content:hover .footer-text { color: #fff; }
    .footer-text { font-size: 0.65rem; color: #444; letter-spacing: 2px; text-transform: uppercase; transition: color 0.3s ease; }

    .content-wrapper { position: relative; z-index: 2; width: 100%; padding-top: 100vh; }

    @media (max-width: 768px) {
      .header-center { top: 80px; font-size: 1.2rem; }
      .main-nav { top: auto; bottom: 100px; left: 20px; }
    }
  </style>
</head>
<body>

  <div id="transition-overlay"></div>

  <div class="header-center">
    <span id="typewriter"></span><span class="cursor"></span>
  </div>

  <nav class="main-nav">
    <div class="nav-logo">MG. Lawless</div>
    <div class="nav-links">
      <a href="./" class="transition-link" style="color: #fff;">Home</a>
      <a href="works.html" class="transition-link">Works</a>
      <a href="blog.html" class="transition-link">Blog</a>
      <div class="copy-link" id="copyEmail">
        <span class="label">Copy Email</span>
        <span class="status">Email Copied ✓</span>
      </div>
    </div>
  </nav>

  <div class="content-wrapper"></div>

  <footer>
    <div class="footer-content">
      <a href="https://www.youtube.com/@lawless-mg" target="_blank">
        <svg class="yt-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.14 1 12 1 12s0 3.86.46 5.58a2.78 2.78 0 0 0 1.94 2c1.72.42 8.6.42 8.6.42s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.86 23 12 23 12s0-3.86-.46-5.58z"></path>
          <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon>
        </svg>
      </a>
      <div class="footer-text">©2026 / All Right Reserved / LAWLESS / MARWAN GEBRIEL</div>
    </div>
  </footer>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GUI } from 'lil-gui';

    // FADE TRANSITION LOGIC
    window.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('transition-overlay');
      setTimeout(() => { overlay.style.opacity = '0'; }, 100);

      document.querySelectorAll('.transition-link').forEach(link => {
        link.addEventListener('click', (e) => {
          if (link.href === window.location.href) return;
          e.preventDefault();
          const target = link.href;
          overlay.style.opacity = '1';
          setTimeout(() => { window.location.href = target; }, 600);
        });
      });
    });

    // TYPEWRITER
    const text = "Welcome Traveller";
    const typewriterElement = document.getElementById('typewriter');
    let charIndex = 0;
    function type() {
      if (charIndex < text.length) {
        typewriterElement.textContent += text.charAt(charIndex);
        charIndex++;
        setTimeout(type, 100);
      }
    }
    setTimeout(type, 1500);

    // EMAIL
    const emailBtn = document.getElementById('copyEmail');
    const myEmail = 'maroggebriel@gmail.com';
    emailBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(myEmail).then(() => {
        emailBtn.classList.add('copied');
        setTimeout(() => emailBtn.classList.remove('copied'), 2000);
      });
    });

    // THREE.JS GALAXY (Params & Setup)
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 6, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const params = {
      count: 70000, radius: 12, branches: 3, spin: 1, randomness: 0.3,
      insideColor: '#26c9df', outsideColor: '#151ce0'
    };

    let geometry, material, points = null;

    const generateGalaxy = () => {
      if(points !== null) { geometry.dispose(); material.dispose(); scene.remove(points); }
      geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(params.count * 3);
      const colors = new Float32Array(params.count * 3);
      const colorInside = new THREE.Color(params.insideColor);
      const colorOutside = new THREE.Color(params.outsideColor);

      for(let i = 0; i < params.count; i++) {
        const i3 = i * 3;
        const radius = Math.random() * params.radius;
        const spinAngle = radius * params.spin;
        const branchAngle = (i % params.branches) / params.branches * Math.PI * 2;
        const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
        const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
        const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
        positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
        positions[i3 + 1] = randomY;
        positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;
        const mixedColor = colorInside.clone().lerp(colorOutside, radius / params.radius);
        colors[i3] = mixedColor.r; colors[i3 + 1] = mixedColor.g; colors[i3 + 2] = mixedColor.b;
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      material = new THREE.PointsMaterial({ size: 0.015, sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending, vertexColors: true });
      points = new THREE.Points(geometry, material);
      scene.add(points);
    };

    generateGalaxy();

    function animate() {
      requestAnimationFrame(animate);
      if (points) points.rotation.y += 0.0005;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
