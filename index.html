<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M. Lawless | Locked Galaxy</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
    .main-nav { position: fixed; top: 30px; left: 30px; z-index: 10; color: white; display: flex; flex-direction: column; gap: 15px; pointer-events: none; }
    .nav-logo { font-weight: 800; font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; border-left: 2px solid #ff3366; padding-left: 10px; }
    .nav-links { display: flex; flex-direction: column; gap: 8px; font-size: 0.75rem; color: #666; pointer-events: auto; }
    .nav-links span { cursor: pointer; transition: 0.3s; width: fit-content; }
    .nav-links span:hover { color: #fff; padding-left: 5px; }
    .lil-gui { --width: 250px; z-index: 100; }
  </style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-logo">M. Lawless</div>
    <div class="nav-links">
      <span>INDEX</span>
      <span>ARCHIVE</span>
      <span>INFO</span>
    </div>
  </nav>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GUI } from 'lil-gui';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // --- CONTROLS ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    
    // NAVIGATION LOCKS
    controls.enablePan = false;   // Disable right-click/two-finger dragging
    controls.enableZoom = true;  // Keep scroll/pinch zoom
    controls.enableRotate = true; // Keep left-click rotation

    const params = {
      count: 70000,
      size: 0.015,
      radius: 12,
      branches: 3,
      spin: 1,
      randomness: 0.3,
      insideColor: '#ff3366',
      outsideColor: '#3366ff'
    };

    let geometry, material, points = null;

    const generateGalaxy = () => {
      if(points !== null) {
        geometry.dispose();
        material.dispose();
        scene.remove(points);
      }

      geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(params.count * 3);
      const colors = new Float32Array(params.count * 3);
      const colorInside = new THREE.Color(params.insideColor);
      const colorOutside = new THREE.Color(params.outsideColor);

      for(let i = 0; i < params.count; i++) {
        const i3 = i * 3;
        const radius = Math.random() * params.radius;
        const spinAngle = radius * params.spin;
        const branchAngle = (i % params.branches) / params.branches * Math.PI * 2;

        const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
        const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
        const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;

        positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
        positions[i3 + 1] = randomY;
        positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

        const mixedColor = colorInside.clone().lerp(colorOutside, radius / params.radius);
        colors[i3] = mixedColor.r;
        colors[i3 + 1] = mixedColor.g;
        colors[i3 + 2] = mixedColor.b;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      material = new THREE.PointsMaterial({
        size: params.size,
        sizeAttenuation: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true
      });

      points = new THREE.Points(geometry, material);
      scene.add(points);
    };

    generateGalaxy();

    const gui = new GUI();
    gui.add(params, 'size', 0.001, 0.1, 0.001).name('Star Size').onChange(() => { material.size = params.size; });
    gui.add(params, 'count', 1000, 100000, 100).name('Star Count').onFinishChange(generateGalaxy);
    gui.addColor(params, 'insideColor').name('Core Color').onFinishChange(generateGalaxy);
    gui.addColor(params, 'outsideColor').name('Edge Color').onFinishChange(generateGalaxy);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      if (points) points.rotation.y += 0.0005;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
