<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works | MG. Lawless</title>
  <link rel="icon" type="image/jpeg" href="https://cdn.discordapp.com/attachments/1186625565168500796/1491112293696536607/634fc7589ecb8b3229528763c2a246a1.jpg">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #26c9df;
      --text-dim: #666;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      background: #000; 
      font-family: 'Inter', -apple-system, sans-serif; 
      color: white;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* TRANSITION OVERLAY */
    #transition-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 9999;
      pointer-events: none;
      transition: opacity 0.6s ease-in-out;
    }

    /* Navigation - PIXEL PERFECT SYNC */
    .main-nav { 
      position: fixed; 
      top: 40px; 
      left: 40px; 
      z-index: 10; 
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
    }

    .nav-logo { 
      font-weight: 800; 
      font-size: 1.2rem; 
      letter-spacing: 3px; 
      text-transform: uppercase; 
      border-left: 3px solid var(--accent); 
      padding-left: 15px; 
    }

    .nav-links { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      font-size: 0.85rem; 
      color: var(--text-dim); 
    }

    .nav-links a { 
      text-decoration: none;
      color: inherit;
      cursor: pointer; 
      transition: 0.3s ease; 
      width: fit-content; 
    }

    .nav-links a:hover { 
      color: #fff; 
      transform: translateX(5px);
    }

    /* Copy Link Logic */
    .copy-link {
      color: var(--accent);
      cursor: pointer;
      position: relative;
      height: 1.2rem; 
      display: flex;
      align-items: center;
      transition: color 0.4s ease-in-out, transform 0.3s ease;
      width: fit-content;
    }
    .copy-link:hover { transform: translateX(5px); }
    .copy-link .status { 
      position: absolute; left: 0; opacity: 0; color: #4ade80; font-weight: bold;
      pointer-events: none; white-space: nowrap; transform: translateY(5px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .copy-link.copied .label { opacity: 0; transform: translateY(-5px); }
    .copy-link.copied .status { opacity: 1; transform: translateY(0); }

    /* Centered Container */
    .content-container {
      max-width: 50%; 
      margin: 0 auto; 
      padding: 100px 0; 
      display: flex;
      flex-direction: column;
      gap: 150px; 
    }

    .project-entry { width: 100%; }
    .project-title { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 2.2rem; margin-bottom: 8px; }
    .project-tagline { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 2px; }
    
    .project-media-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; 
      gap: 15px;
      margin-bottom: 25px;
    }
    .project-media-grid img {
      width: 100%;
      height: auto;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
    }

    .project-description { color: #aaa; font-size: 1rem; line-height: 1.8; }

    @media (max-width: 768px) {
      .main-nav { top: auto; bottom: 100px; left: 20px; }
      .content-container { max-width: 90%; padding-top: 60px; }
    }
  </style>
</head>
<body>

  <div id="transition-overlay"></div>

  <nav class="main-nav">
    <div class="nav-logo">MG. Lawless</div>
    <div class="nav-links">
      <a href="./" class="transition-link">Home</a>
      <a href="works.html" class="transition-link" style="color: #fff;">Works</a>
      <a href="blog.html" class="transition-link">Blog</a>
      <div class="copy-link" id="copyEmail">
        <span class="label">Copy Email</span>
        <span class="status">Email Copied ✓</span>
      </div>
    </div>
  </nav>

  <main class="content-container">
    <section class="project-entry">
      <h1 class="project-title">RISKY FISHING</h1>
      <p class="project-tagline">Visual Design / 2026</p>
      <div class="project-media-grid">
        <img src="https://via.placeholder.com/800x450" alt="Work">
        <img src="https://via.placeholder.com/800x450" alt="Work">
      </div>
      <p class="project-description">This description will fade in beautifully along with the rest of the page.</p>
    </section>
  </main>

  <script>
    // FADE SCRIPT
    window.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('transition-overlay');
      
      // Fade out the black overlay on load
      setTimeout(() => {
        overlay.style.opacity = '0';
      }, 100);

      // Intercept link clicks to fade back in
      document.querySelectorAll('.transition-link').forEach(link => {
        link.addEventListener('click', (e) => {
          // If clicking the same page, don't trigger fade out
          if (link.href === window.location.href) return;

          e.preventDefault();
          const target = link.href;
          overlay.style.opacity = '1';

          setTimeout(() => {
            window.location.href = target;
          }, 600); // Matches the 0.6s CSS transition
        });
      });
    });

    // COPY EMAIL LOGIC
    const emailBtn = document.getElementById('copyEmail');
    const myEmail = 'maroggebriel@gmail.com';
    emailBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(myEmail).then(() => {
        emailBtn.classList.add('copied');
        setTimeout(() => emailBtn.classList.remove('copied'), 2000);
      });
    });
  </script>

</body>
</html>
